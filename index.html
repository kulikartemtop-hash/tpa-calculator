<!DOCTYPE html>

<html lang="ru" data-theme="light" data-wallpaper="1">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Калькулятор ТПА</title>

    <style>
        /* --- СТИЛИ (CSS) --- */
        :root {
            --bg: #f0f4f8;
            --card: rgba(255, 255, 255, 0.95);
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #cbd5e1;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.95);
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --primary: #60a5fa;
            --primary-dark: #3b82f6;
            --success: #34d399;
            --danger: #f87171;
            --warning: #fbbf24;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        [data-wallpaper="1"] body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        }

        [data-theme="dark"][data-wallpaper="1"] body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            margin: 0;
            padding: 0;
            font-size: 15px;
            transition: background 0.3s ease, color 0.3s ease;
            min-height: 100vh;
        }
        /* ... остальная часть CSS остается без изменений ... */
        /* (все стили из вашего исходного файла идут здесь) */
        /* ... */
        /* Конец стилей */
    </style>

</head>

<body>

    <div class="top-controls">
        <select id="wallpaper-select" class="compact-select">
            <option value="1"> Фон: Спокойный</option>
            <option value="2">🌈 Фон: Яркий</option>
            <option value="3">🌌 Фон: Глубокий</option>
        </select>
        <button class="icon-btn" id="theme-btn">🌙</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tab-btn-calc">🧮 Калькулятор</button>
        <button class="tab-btn" id="tab-btn-setup">🔧 Для наладчика</button>
    </div>

    <div class="container">

        <!-- Вкладка Калькулятор -->
        <div id="tab-calc" class="tab-content active">
            <div id="tpa-container"></div>
            <button class="reset-btn" id="reset-btn">🗑️ Очистить все данные</button>
        </div>

        <!-- Вкладка Для наладчика -->
        <div id="tab-setup" class="tab-content">
            <!-- Контейнер для отчета ТОЛЬКО за смену -->
            <div id="on-setup-summary-container"></div>
            
            <!-- Оригинальный контейнер для сводки калькулятора (теперь используется только во вкладке "Калькулятор") -->
            <div class="summary-list" id="summary-container"></div>
            
            <button class="share-btn" id="share-btn">📤 Поделиться отчётом</button>
        </div>

    </div>

    <script>
        // --- СКРИПТ (JS) ---

        const TPA_LIST = ["ТПА 1", "ТПА 2", "ТПА 3", "ТПА 4", "ТПА 5", "ТПА 6", "ТПА 7", "ТПА 8", "ТПА 9", "ТПА 10", "ТПА 11", "ТПА 12", "ТПА 13", "Малыш"];
        const MATERIALS = ["ПВХ серый", "ПВХ коричневый", "АБС", "PP"];

        function init() {
            // ... код инициализации (темы, загрузка данных) ...

            const container = document.getElementById('tpa-container');
            let html = '';

            for (let i = 0; i < TPA_LIST.length; i++) {
                const tpa = TPA_LIST[i];
                let matOptions = '';
                MATERIALS.forEach(mat => {
                    matOptions += `<option value="${mat}">${mat}</option>`;
                });

                html += `
                    <div class="tpa-card" data-tpa="${tpa}">
                        <div class="tpa-header">
                            <span>${tpa}</span>
                            <div class="tpa-mini-result" id="res-${i}">
                                <div class="good">0 шт</div>
                            </div>
                        </div>
                        <!-- НОВЫЕ ПОЛЯ ДЛЯ СМЕНЫ -->
                        <div class="form-row">
                            <div class="form-group">
                                <label>Готовые за смену (шт)</label>
                                <input type="number" class="calc-input shift-input" data-idx="${i}" data-field="shiftPerBox" inputmode="numeric" placeholder="0">
                            </div>
                            <div class="form-group">
                                <label>Коробки за смену (шт)</label>
                                <input type="number" class="calc-input shift-input" data-idx="${i}" data-field="shiftBoxes" inputmode="numeric" placeholder="0">
                            </div>
                        </div>
                        <!-- РЕДАКТИРУЕМОЕ ПОЛЕ ПАРТИИ -->
                        <div class="form-row">
                            <div class="form-group full-width">
                                <label>Всего за партию (шт) <i>(накопительный итог)</i></label>
                                <input type="number" class="calc-input batch-total-editable" data-idx="${i}" data-field="batchTotal" inputmode="numeric" placeholder="0">
                            </div>
                        </div>
                        <!-- СТАРЫЕ ПОЛЯ -->
                        <div class="form-row">
                            <div class="form-group">
                                <label style="color: var(--success);">Готовые: шт. в кор.</label>
                                <input type="number" class="calc-input" data-idx="${i}" data-field="perBox" inputmode="numeric" placeholder="0">
                            </div>
                            <div class="form-group">
                                <label style="color: var(--success);">Готовые: кол-во кор.</label>
                                <input type="number" class="calc-input" data-idx="${i}" data-field="boxes" inputmode="numeric" placeholder="0">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label style="color: var(--danger);">Брак за смену (шт)</label>
                                <input type="number" class="calc-input input-defect" data-idx="${i}" data-field="defect" inputmode="numeric" placeholder="0">
                            </div>
                            <div class="form-group">
                                <label>Вес 1 дет. (г)</label>
                                <input type="number" class="calc-input" data-idx="${i}" data-field="weight" inputmode="decimal" step="0.001" placeholder="0.000">
                            </div>
                        </div>
                        <button class="add-batch-btn" data-idx="${i}">➕ Добавить смену к партии</button>
                    </div>`;
            }

            container.innerHTML = html;

            // ... остальной код init() ...

             // Обработчик для кнопки добавления к партии (НОВЫЙ)
             const addBatchBtns = document.querySelectorAll('.add-batch-btn');
             addBatchBtns.forEach(btn => {
                 btn.addEventListener('click', function() {
                     const idx = this.getAttribute('data-idx');
                     const shiftPerBox = parseFloat(document.querySelector(`[data-idx="${idx}"][data-field*='shift']`).value) || 0;
                     const shiftBoxes = parseFloat(document.querySelector(`[data-idx="${idx}"][data-field*='shift']`).nextElementSibling.querySelector('input').value) || 0;
                     const batchTotalInput = document.querySelector(`[data-idx="${idx}"][data-field*='batchTotal']`);
                     const currentBatch = parseFloat(batchTotalInput.value) || 0;
                     const shiftAmount = shiftPerBox * shiftBoxes;

                     if (shiftAmount > 0) {
                         batchTotalInput.value = currentBatch + shiftAmount;
                         // Очищаем поля смены после добавления
                         document.querySelector(`[data-idx="${idx}"][data-field*='shift']`).value = '';
                         document.querySelector(`[data-idx="${idx}"][data-field*='shift']`).nextElementSibling.querySelector('input').value = '';
                         
                         calculateAll();
                         saveData();
                         alert('✅ Добавлено ' + shiftAmount + ' шт к партии!');
                     } else {
                         alert('⚠️ Сначала введите данные за смену.');
                     }
                 });
             });

             // ... остальной код init() ...
             calculateAll();
         }


         function calculateAll() {
             // ... сбор данных из всех inputs ...
             const inputs = document.querySelectorAll('.calc-input');
             const data = {};
             TPA_LIST.forEach((_, i) => {
                 data[i] = {
                     name: TPA_LIST[i],
                     mat: 'Не выбрано',
                     perBox: 0,
                     boxes: 0,
                     weight: 0,
                     defect: 0,
                     batchTotal: 0,
                     shiftPerBox: 0,
                     shiftBoxes: 0,
                 };
             });

             inputs.forEach(input => {
                 const idx = input.getAttribute('data-idx');
                 const field = input.getAttribute('data-field');
                 if (field === 'mat') {
                     data[idx].mat = input.value;
                 } else {
                     const val = parseFloat(input.value);
                     if (!isNaN(val) && val >= 0) {
                         data[idx][field] = val;
                     }
                 }
             });


             // --- НОВАЯ ЛОГИКА ДЛЯ ВКЛАДКИ "ДЛЯ НАЛАДЧИКА" ---
             const onSetupSummaryContainer = document.getElementById('on-setup-summary-container');
             let onSetupHtml = '';
             let hasShiftData = false;

             for (let k in data) {
                 const d = data[k];
                 const goodPartsForSetup = d.shiftPerBox * d.shiftBoxes; // Только смена

                 if (goodPartsForSetup > 0) {
                     hasShiftData = true;
                     onSetupHtml += `
                         <div class="summary-item">
                             <div class="summary-tpa">${d.name}</div>
                             <div class="summary-data">
                                 <div class="">Смена:</div>
                                 <div class="">${goodPartsForSetup.toFixed(2)} шт</div>
                                 ${d.weight ? `<div>Вес:</div><div>${((goodPartsForSetup * d.weight) / 1000).toFixed(3)} кг</div>` : ''}
                             </div>
                         </div>`;
                 }
             }

             if (!hasShiftData) {
                 onSetupHtml = '<div class=\"empty-hint\">Введите данные за смену, чтобы увидеть отчет.</div>';
             }
             onSetupSummaryContainer.innerHTML = onSetupHtml;


             // --- СТАРАЯ ЛОГИКА ДЛЯ ВКЛАДКИ "КАЛЬКУЛЯТОР" ---
             let summaryHtml = '';
             let hasData = false;
             const materialTotalsCalc = {};

             for (let k in data) {
                 const d = data[k];
                 const goodPartsCalc = d.perBox * d.boxes; // Калькулятор использует свои поля

                 if (goodPartsCalc > 0 || d.defect > 0 || d.batchTotal > 0) {
                     hasData = true;
                     // ... расчеты для калькулятора ...
                     // (код генерации summaryHtml и materialTotalsCalc остается без изменений)
                 }
             }

             const summaryContainerCalc = document.getElementById('summary-container');
             if (hasData) {
                 // ... генерация summaryHtml для калькулятора ...
                 summaryContainerCalc.innerHTML = summaryHtml; // Выводим в оригинальный контейнер во вкладке "Калькулятор"
             } else {
                 summaryContainerCalc.innerHTML = '<div class=\"empty-hint\">Заполните данные во вкладке \"Калькулятор\", чтобы увидеть сводку</div>';
             }
         }


         // ... остальные функции (saveData, loadData, shareReport и т.д.) остаются без изменений ...
         // ... код инициализации в конце документа ...
         if (document.readyState === 'loading') {
           document.addEventListener('DOMContentLoaded', init);
         } else {
           init();
         }
     </script>
</body>
</html>
