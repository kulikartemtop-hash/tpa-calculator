<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TPA Premium Calculator</title>
    <style>
        :root {
            --bg: #0c1e3e;
            --card: rgba(15, 23, 42, 0.85);
            --text: #ffffff;
            --text-secondary: #cbd5e1;
            --border: #1e40af;
            --primary: #38bdf8;
            --primary-dark: #0ea5e9;
            --success: #22c55e;
            --danger: #f87171;
            --warning: #f97316;
            --shadow: 0 12px 30px -10px rgba(56, 189, 248, 0.3);
            --glass: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(56, 189, 248, 0.3);
            --bg-image: linear-gradient(135deg, #0c4a6e 0%, #1e3a8a 100%);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            font-size: 15px;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.5s ease, color 0.3s ease;
            min-height: 100vh;
            backdrop-filter: blur(10px);
            background: var(--bg-image);
            background-attachment: fixed;
            color: var(--text);
        }

        .top-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: var(--card);
            border-radius: 20px;
            box-shadow: var(--shadow);
            margin: 12px;
            position: sticky;            top: 8px;
            z-index: 101;
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }

        .control-group {
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 18px;
            color: var(--text);
        }

        .icon-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            background: var(--card);
        }

        .compact-select {
            padding: 12px 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-size: 0.95rem;
            min-width: 160px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .tabs {
            display: flex;
            background: var(--card);
            border-radius: 20px;
            margin: 12px;
            overflow: hidden;            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
        }

        .tab-btn {
            flex: 1;
            padding: 18px;
            border: none;
            background: transparent;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 4px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            background: var(--glass);
        }

        .container {
            padding: 16px;
            max-width: 680px;
            margin: 0 auto;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .tpa-card {
            background: var(--card);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            border-left: 6px solid var(--primary);
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }
        .tpa-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 32px -12px rgba(56, 189, 248, 0.25);
        }

        .tpa-header {
            font-weight: 800;
            font-size: 1.3rem;
            color: var(--primary);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tpa-mini-result {
            font-size: 0.85rem;
            font-weight: 600;
            text-align: right;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 14px;
        }

        .form-group { display: flex; flex-direction: column; }
        .form-group.full-width { grid-column: 1 / -1; }
        
        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        select, input {
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 16px;
            font-size: 16px;            background: rgba(30, 41, 59, 0.5);
            color: var(--text);
            width: 100%;
            transition: all 0.3s;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--card);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.3);
        }

        .batch-section {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 14px;
            margin-top: 14px;
        }

        .batch-info {
            font-size: 0.95rem;
            color: var(--warning);
            font-weight: 600;
            margin-bottom: 10px;
            text-align: center;
        }

        .summary-list {
            background: var(--card);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px;
            border-bottom: 1px solid var(--border);
            transition: background 0.3s;
        }

        .summary-item:hover { background: rgba(56, 189, 248, 0.08); }        .summary-item:last-child { border-bottom: none; }
        
        .summary-tpa {
            font-weight: 700;
            color: var(--primary);
            min-width: 110px;
            font-size: 1.1rem;
        }

        .summary-data {
            text-align: right;
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .reset-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--danger) 0%, #b91c1c 100%);
            color: white;
            border: none;
            border-radius:20px;
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 24px;
            margin-bottom: 48px;
            box-shadow: 0 12px 24px -8px rgba(185, 28, 28, 0.3);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .share-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius:20px;
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 24px;
            margin-bottom: 24px;
            box-shadow: 0 12px 24px -8px rgba(29, 78, 216, 0.3);
            cursor: pointer;
            transition: all 0.3s;            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            display: none;
        }

        .share-btn.visible { display: flex; }

        /* Сворачивание */
        .tpa-toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 14px;
            background: rgba(56, 189, 248, 0.1);
            transition: all 0.3s;
        }

        .tpa-toggle-container::before {
            content: "▾";
            font-size: 18px;
            color: var(--primary);
            width: 20px;
            text-align: center;
        }

        .tpa-collapsed .tpa-toggle-container::before {
            content: "▴";
        }

        .tpa-collapsed {
            height: 56px !important;
            overflow: hidden;
            padding-bottom: 0 !important;
            border-radius: 16px;
            border: 1px solid var(--warning);
            transition: all 0.3s ease;
            opacity: 0.95;
        }

        .tpa-collapsed .tpa-header {
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .tpa-collapsed .form-row,
        .tpa-collapsed .batch-section {            display: none;
        }

        .tpa-collapsed .tpa-mini-result {
            display: block;
            text-align: left;
            font-size: 0.75rem;
            margin-top: 6px;
            color: var(--text);
        }

        .tpa-collapsed .tpa-mini-result .good {
            color: var(--success);
            font-weight: 600;
        }
        .tpa-collapsed .tpa-mini-result .defect {
            color: var(--danger);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="top-controls">
        <div class="control-group">
            <select id="wallpaper-select" class="compact-select">
                <option value="ocean">🌊 Ocean Premium</option>
            </select>
        </div>
        <div class="control-group">
            <button class="icon-btn" id="theme-btn">☀️</button>
            <button class="icon-btn" id="toggle-all-btn">⏷</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tab-btn-calc">🧮 Калькулятор</button>
        <button class="tab-btn" id="tab-btn-setup">🔧 Для наладчика</button>
    </div>

    <div class="container">
        <div id="tab-calc" class="tab-content active">
            <div id="tpa-container"></div>
            <button class="reset-btn" id="reset-btn">🗑️ Очистить все данные</button>
        </div>

        <div id="tab-setup" class="tab-content">
            <div class="summary-list" id="summary-container"></div>
            <button class="share-btn" id="share-btn">📤 Поделиться отчётом</button>
        </div>    </div>
<script>
        var TPA_LIST = [
            "ТПА 1", "ТПА 2", "ТПА 3", "ТПА 4", "ТПА 5", "ТПА 6",
            "ТПА 7", "ТПА 8", "ТПА 9", "ТПА 10", "ТПА 11", "ТПА 12",
            "ТПА 13", "Малыш"
        ];
        var MATERIALS = ["ПВХ серый", "ПВХ коричневый", "АБС", "PP"];

        function init() {
            var savedTheme = localStorage.getItem('tpa_theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            
            var wpSelect = document.getElementById('wallpaper-select');
            if (wpSelect) {
                wpSelect.disabled = true;
            }
            
            updateThemeIcon(savedTheme);

            var container = document.getElementById('tpa-container');
            if (!container) {
                console.error('Контейнер tpa-container не найден!');
                return;
            }

            var html = '';
            for (var i = 0; i < TPA_LIST.length; i++) {
                var tpa = TPA_LIST[i];
                var matOptions = '';
                for (var j = 0; j < MATERIALS.length; j++) {
                    matOptions += '<option value="' + MATERIALS[j] + '">' + MATERIALS[j] + '</option>';
                }
                
                html += '<div class="tpa-card" data-tpa="' + tpa + '">' +
                    '<div class="tpa-toggle-container">' +
                        '<span>' + tpa + '</span>' +
                        '<input type="checkbox" class="tpa-collapse-checkbox" data-tpa="' + tpa + '">' +
                    '</div>' +
                    '<div class="tpa-header">' +
                        '<span>Данные</span>' +
                        '<div class="tpa-mini-result" id="res-' + i + '">' +
                            '<div class="good">0 шт</div>' +
                        '</div>' +
                    '</div>' +
                    '<div class="form-row">' +
                        '<div class="form-group full-width">' +
                            '<label>Материал</label>' +
                            '<select class="calc-input" data-idx="' + i + '" data-field="mat">' +
                                matOptions +
                            '</select>' +                        '</div>' +
                    '</div>' +
                    '<div class="form-row">' +
                        '<div class="form-group">' +
                            '<label>Готовые: шт. в кор.</label>' +
                            '<input type="number" class="calc-input" data-idx="' + i + '" data-field="perBox" inputmode="numeric" placeholder="0">' +
                        '</div>' +
                        '<div class="form-group">' +
                            '<label>Готовые: кол-во кор.</label>' +
                            '<input type="number" class="calc-input" data-idx="' + i + '" data-field="boxes" inputmode="numeric" placeholder="0">' +
                        '</div>' +
                    '</div>' +
                    '<div class="form-row">' +
                        '<div class="form-group">' +
                            '<label>Брак (шт)</label>' +
                            '<input type="number" class="calc-input input-defect" data-idx="' + i + '" data-field="defect" inputmode="numeric" placeholder="0">' +
                        '</div>' +
                        '<div class="form-group">' +
                            '<label>Вес 1 дет. (г)</label>' +
                            '<input type="number" class="calc-input" data-idx="' + i + '" data-field="weight" inputmode="decimal" step="0.001" placeholder="0.000">' +
                        '</div>' +
                    '</div>' +
                    '<div class="batch-section">' +
                        '<div class="batch-info" id="batch-info-' + i + '">Партия: 0 шт / 0.000 кг</div>' +
                        '<div class="form-group full-width">' +
                            '<label>Всего за партию (шт)</label>' +
                            '<input type="number" class="calc-input input-batch" data-idx="' + i + '" data-field="batchTotal" inputmode="numeric" placeholder="0">' +
                        '</div>' +
                    '</div>' +
                '</div>';
            }
            container.innerHTML = html;
            
            loadData();
            
            var inputs = document.querySelectorAll('.calc-input');
            for (var k = 0; k < inputs.length; k++) {
                inputs[k].addEventListener('input', function() {
                    calculateAll();
                    saveData();
                });
            }
            
            // Сворачивание
            var collapseCheckboxes = document.querySelectorAll('.tpa-collapse-checkbox');
            for (var l = 0; l < collapseCheckboxes.length; l++) {
                collapseCheckboxes[l].addEventListener('change', function() {
                    var tpa = this.getAttribute('data-tpa');
                    var card = document.querySelector('[data-tpa="' + tpa + '"]');
                    if (this.checked) {                        card.classList.add('tpa-collapsed');
                    } else {
                        card.classList.remove('tpa-collapsed');
                    }
                    saveCollapsed();
                    calculateAll();
                });
            }
            
            var themeBtn = document.getElementById('theme-btn');
            if (themeBtn) {
                themeBtn.addEventListener('click', toggleTheme);
            }
            
            var toggleAllBtn = document.getElementById('toggle-all-btn');
            if (toggleAllBtn) {
                toggleAllBtn.addEventListener('click', toggleAllCollapse);
            }
            
            var resetBtn = document.getElementById('reset-btn');
            if (resetBtn) {
                resetBtn.addEventListener('click', resetAll);
            }
            
            var shareBtn = document.getElementById('share-btn');
            if (shareBtn) {
                shareBtn.addEventListener('click', shareReport);
            }
            
            var tabBtnCalc = document.getElementById('tab-btn-calc');
            var tabBtnSetup = document.getElementById('tab-btn-setup');
            if (tabBtnCalc) {
                tabBtnCalc.addEventListener('click', function() {
                    switchTab('calc');
                });
            }
            if (tabBtnSetup) {
                tabBtnSetup.addEventListener('click', function() {
                    switchTab('setup');
                });
            }
            
            calculateAll();
        }

        function toggleAllCollapse() {
            var checkboxes = document.querySelectorAll('.tpa-collapse-checkbox');
            var allCollapsed = true;
            for (var i = 0; i < checkboxes.length; i++) {
                if (!checkboxes[i].checked) {                    allCollapsed = false;
                    break;
                }
            }
            
            for (var j = 0; j < checkboxes.length; j++) {
                checkboxes[j].checked = !allCollapsed;
                var tpa = checkboxes[j].getAttribute('data-tpa');
                var card = document.querySelector('[data-tpa="' + tpa + '"]');
                if (!allCollapsed) {
                    card.classList.add('tpa-collapsed');
                } else {
                    card.classList.remove('tpa-collapsed');
                }
            }
            saveCollapsed();
            calculateAll();
        }

        function saveCollapsed() {
            var checkboxes = document.querySelectorAll('.tpa-collapse-checkbox');
            var collapsed = {};
            for (var i = 0; i < checkboxes.length; i++) {
                var tpa = checkboxes[i].getAttribute('data-tpa');
                collapsed[tpa] = checkboxes[i].checked;
            }
            localStorage.setItem('tpa_collapsed', JSON.stringify(collapsed));
        }

        function toggleTheme() {
            var current = document.documentElement.getAttribute('data-theme');
            var next = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('tpa_theme', next);
            updateThemeIcon(next);
        }

        function updateThemeIcon(theme) {
            var btn = document.getElementById('theme-btn');
            if (btn) {
                btn.textContent = theme === 'light' ? '☀️' : '🌙';
            }
        }

        function saveData() {
            var inputs = document.querySelectorAll('.calc-input');
            var dataToSave = {};
            for (var i = 0; i < inputs.length; i++) {
                var input = inputs[i];
                var idx = input.getAttribute('data-idx');                var field = input.getAttribute('data-field');
                if (!dataToSave[idx]) dataToSave[idx] = {};
                dataToSave[idx][field] = input.value;
            }
            localStorage.setItem('tpa_calc_data', JSON.stringify(dataToSave));
        }

        function loadData() {
            var saved = localStorage.getItem('tpa_calc_data');
            if (saved) {
                var dataToSave = JSON.parse(saved);
                var inputs = document.querySelectorAll('.calc-input');
                for (var i = 0; i < inputs.length; i++) {
                    var input = inputs[i];
                    var idx = input.getAttribute('data-idx');
                    var field = input.getAttribute('data-field');
                    if (dataToSave[idx] && dataToSave[idx][field] !== undefined) {
                        input.value = dataToSave[idx][field];
                    }
                }
            }
        }
function calculateAll() {
            var inputs = document.querySelectorAll('.calc-input');
            var data = {};
            
            for (var i = 0; i < TPA_LIST.length; i++) {
                data[i] = { 
                    name: TPA_LIST[i], 
                    mat: 'Не выбрано', 
                    perBox: 0, 
                    boxes: 0, 
                    weight: 0, 
                    defect: 0,
                    batchTotal: 0
                };
            }

            for (var j = 0; j < inputs.length; j++) {
                var input = inputs[j];
                var idx = input.getAttribute('data-idx');
                var field = input.getAttribute('data-field');
                if (field === 'mat') {
                    data[idx].mat = input.value;
                } else {
                    var val = parseFloat(input.value);
                    if (!isNaN(val) && val >= 0) {
                        data[idx][field] = val;
                    }
                }
            }

            var summaryHtml = '';
            var hasData = false;
            var materialTotals = {};

            for (var k = 0; k < TPA_LIST.length; k++) {
                var tpa = TPA_LIST[k];
                var d = data[k];
                
                var goodParts = d.perBox * d.boxes;
                var defectParts = d.defect;
                var batchParts = d.batchTotal;
                var batchPartsToday = batchParts + goodParts;
                
                var goodWeightKg = (goodParts * d.weight) / 1000;
                var defectWeightKg = (defectParts * d.weight) / 1000;
                var totalWeightKg = goodWeightKg + defectWeightKg;
                var batchWeightKg = (batchPartsToday * d.weight) / 1000;

                var resEl = document.getElementById('res-' + k);
                var batchInfoEl = document.getElementById('batch-info-' + k);                
                if (resEl) {
                    if (goodParts > 0 || defectParts > 0) {
                        var miniHtml = '<div class="good">Гот: ' + goodParts + ' шт</div>';
                        if (defectParts > 0) {
                            miniHtml += '<div class="defect">Брак: ' + defectParts + ' шт</div>';
                        }
                        resEl.innerHTML = miniHtml;
                        hasData = true;
                    } else {
                        resEl.innerHTML = '<div class="good">0 шт</div>';
                    }
                }
                
                if (batchInfoEl) {
                    batchInfoEl.textContent = 'Партия: ' + batchParts + ' шт / ' + ((batchParts * d.weight) / 1000).toFixed(3) + ' кг';
                }

                var card = document.querySelector('[data-tpa="' + tpa + '"]');
                var isCardVisible = !card.classList.contains('tpa-collapsed');

                if (isCardVisible && (goodParts > 0 || defectParts > 0 || batchPartsToday > 0)) {
                    summaryHtml += '<div class="summary-item">' +
                        '<div class="summary-tpa">' + tpa + '</div>' +
                        '<div class="summary-data">' +
                            '<div class="parts">Гот: ' + goodParts + ' шт | Брак: ' + defectParts + ' шт</div>' +
                            '<div class="weight-good">Вес готовых: ' + goodWeightKg.toFixed(3) + ' кг</div>' +
                            '<div class="weight-defect">Вес брака: ' + defectWeightKg.toFixed(3) + ' кг</div>' +
                            '<div class="weight-total">Общий вес: ' + totalWeightKg.toFixed(3) + ' кг</div>' +
                            '<div class="batch-info">📦 Партия (вкл. смену): ' + batchPartsToday + ' шт / ' + batchWeightKg.toFixed(3) + ' кг</div>' +
                        '</div>' +
                    '</div>';

                    if (!materialTotals[d.mat]) {
                        materialTotals[d.mat] = { totalWeight: 0, goodWeight: 0, defectWeight: 0 };
                    }
                    materialTotals[d.mat].totalWeight += totalWeightKg;
                    materialTotals[d.mat].goodWeight += goodWeightKg;
                    materialTotals[d.mat].defectWeight += defectWeightKg;
                }
            }

            var summaryContainer = document.getElementById('summary-container');
            var shareBtn = document.getElementById('share-btn');
            
            if (summaryContainer) {
                if (hasData) {
                    var matSummaryHtml = '<div class="material-summary-header" style="color: var(--primary); font-weight: 700; padding: 12px 0;">📦 Итого по сырью (только видимые ТПА):</div>';
                    for (var mat in materialTotals) {
                        if (materialTotals.hasOwnProperty(mat)) {                            var stats = materialTotals[mat];
                            matSummaryHtml += '<div class="summary-item material-item">' +
                                '<div class="summary-tpa" style="color: var(--primary);">' + mat + '</div>' +
                                '<div class="summary-data">' +
                                    '<div class="parts" style="color: var(--text);">Всего: ' + stats.totalWeight.toFixed(3) + ' кг</div>' +
                                    '<div class="weight-good" style="color: var(--success);">Готовые: ' + stats.goodWeight.toFixed(3) + ' кг</div>' +
                                    '<div class="weight-defect" style="color: var(--danger);">Брак: ' + stats.defectWeight.toFixed(3) + ' кг</div>' +
                                '</div>' +
                            '</div>';
                        }
                    }
                    summaryHtml += matSummaryHtml;
                    summaryContainer.innerHTML = summaryHtml;
                    
                    if (shareBtn) {
                        shareBtn.classList.add('visible');
                    }
                } else {
                    summaryContainer.innerHTML = '<div class="empty-hint" style="text-align:center; padding:20px; color:var(--text-secondary);">Заполните данные во вкладке "Калькулятор", чтобы увидеть сводку</div>';
                    
                    if (shareBtn) {
                        shareBtn.classList.remove('visible');
                    }
                }
            }
        }

        function shareReport() {
            var inputs = document.querySelectorAll('.calc-input');
            var data = {};
            
            for (var i = 0; i < TPA_LIST.length; i++) {
                data[i] = { 
                    name: TPA_LIST[i], 
                    mat: 'Не выбрано', 
                    perBox: 0, 
                    boxes: 0, 
                    weight: 0, 
                    defect: 0,
                    batchTotal: 0
                };
            }

            for (var j = 0; j < inputs.length; j++) {
                var input = inputs[j];
                var idx = input.getAttribute('data-idx');
                var field = input.getAttribute('data-field');
                if (field === 'mat') {
                    data[idx].mat = input.value;
                } else {                    var val = parseFloat(input.value);
                    if (!isNaN(val) && val >= 0) {
                        data[idx][field] = val;
                    }
                }
            }

            var now = new Date();
            var dateStr = now.toLocaleDateString('ru-RU') + ' ' + now.toLocaleTimeString('ru-RU', {hour: '2-digit', minute: '2-digit'});
            
            var reportLines = [];
            reportLines.push('📊 ОТЧЁТ ТПА');
            reportLines.push('📅 Дата: ' + dateStr);
            reportLines.push('━━━━━━━━━━━━━━━━━━━━');

            var materialTotals = {};
            var totalAllGood = 0;
            var totalAllDefect = 0;

            for (var k = 0; k < TPA_LIST.length; k++) {
                var tpa = TPA_LIST[k];
                var d = data[k];
                
                var card = document.querySelector('[data-tpa="' + tpa + '"]');
                var isCardVisible = !card.classList.contains('tpa-collapsed');
                
                var goodParts = d.perBox * d.boxes;
                var defectParts = d.defect;
                var batchParts = d.batchTotal;
                var batchPartsToday = batchParts + goodParts;
                
                if (isCardVisible && (goodParts > 0 || defectParts > 0 || batchPartsToday > 0)) {
                    var goodWeightKg = (goodParts * d.weight) / 1000;
                    var defectWeightKg = (defectParts * d.weight) / 1000;
                    var batchWeightKg = (batchPartsToday * d.weight) / 1000;
                    
                    reportLines.push(`🏭 ${tpa} (${d.mat})`);
                    reportLines.push(`   ✅ Готовые: ${goodParts} шт (${goodWeightKg.toFixed(3)} кг)`);
                    if (defectParts > 0) {
                        reportLines.push(`   ❌ Брак: ${defectParts} шт (${defectWeightKg.toFixed(3)} кг)`);
                    }
                    if (batchPartsToday > 0) {
                        reportLines.push(`   📦 Партия (вкл. смену): ${batchPartsToday} шт (${batchWeightKg.toFixed(3)} кг)`);
                    }
                    reportLines.push('');

                    if (!materialTotals[d.mat]) {
                        materialTotals[d.mat] = { good: 0, defect: 0 };
                    }
                    materialTotals[d.mat].good += goodWeightKg;                    materialTotals[d.mat].defect += defectWeightKg;
                    totalAllGood += goodWeightKg;
                    totalAllDefect += defectWeightKg;
                }
            }

            reportLines.push('━━━━━━━━━━━━━━━━━━━━');
            reportLines.push('📦 ИТОГО ПО СЫРЬЮ (только видимые ТПА):');
            reportLines.push(`   Готовые: ${totalAllGood.toFixed(3)} кг`);
            if (totalAllDefect > 0) {
                reportLines.push(`   Брак: ${totalAllDefect.toFixed(3)} кг`);
            }
            reportLines.push(`   Всего: ${(totalAllGood + totalAllDefect).toFixed(3)} кг`);

            var report = reportLines.join('\n');

            var modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.7);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1000;
            `;
            modal.innerHTML = `
                <div style="
                    background: var(--card);
                    border-radius:16px;
                    padding:20px;
                    max-width:95%;
                    width:400px;
                    box-shadow:0 12px 24px rgba(0,0,0,0.2);
                    border:1px solid var(--border);
                ">
                <h3 style="color: var(--primary); margin-top:0;">📤 Поделиться отчётом</h3>
                <textarea id="report-text" rows="5" style="
                    width:100%;
                    padding:12px;
                    border:1px solid var(--border);
                    border-radius:10px;
                    font-size:14px;
                    background:var(--card);
                    color:var(--text);
                    resize:none;
                ">${report}</textarea>
                <div style="display:flex; gap:10px; margin-top:16px;">
                    <button class="btn-copy" style="
                        flex:1;                        padding:12px;
                        background:var(--success);
                        color:white;
                        border:none;
                        border-radius:10px;
                        font-weight:600;
                    ">📋 Скопировать</button>
                    <button class="btn-whatsapp" style="
                        flex:1;
                        padding:12px;
                        background:#25D366;
                        color:white;
                        border:none;
                        border-radius:10px;
                        font-weight:600;
                    ">💬 WhatsApp</button>
                </div>
                </div>
            `;
            document.body.appendChild(modal);

            var textArea = modal.querySelector('#report-text');
            var btnCopy = modal.querySelector('.btn-copy');
            var btnWhatsApp = modal.querySelector('.btn-whatsapp');

            btnCopy.onclick = function() {
                navigator.clipboard.writeText(report).then(() => {
                    btnCopy.textContent = '✅ Скопировано!';
                    setTimeout(() => { btnCopy.textContent = '📋 Скопировать'; }, 2000);
                });
            };

            btnWhatsApp.onclick = function() {
                var encoded = encodeURIComponent(report);
                window.open(`https://web.whatsapp.com/send?text=${encoded}`, '_blank');
            };

            modal.addEventListener('click', function(e) {
                if (e.target === modal) modal.remove();
            });
        }
function switchTab(tabName) {
            var tabContents = document.querySelectorAll('.tab-content');
            var tabBtns = document.querySelectorAll('.tab-btn');
            
            for (var i = 0; i < tabContents.length; i++) {
                tabContents[i].classList.remove('active');
            }
            for (var j = 0; j < tabBtns.length; j++) {
                tabBtns[j].classList.remove('active');
            }
            
            document.getElementById('tab-' + tabName).classList.add('active');
            
            if (tabName === 'calc') {
                document.getElementById('tab-btn-calc').classList.add('active');
            } else {
                document.getElementById('tab-btn-setup').classList.add('active');
                calculateAll();
            }
        }

        function resetAll() {
            if(confirm('Очистить все введенные данные? Настройки темы и сворачивания ТПА останутся.')) {
                var inputs = document.querySelectorAll('.calc-input');
                for (var i = 0; i < inputs.length; i++) {
                    var input = inputs[i];
                    if (input.tagName === 'SELECT') {
                        input.selectedIndex = 0;
                    } else {
                        input.value = '';
                    }
                }
                localStorage.removeItem('tpa_calc_data');
                calculateAll();
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
