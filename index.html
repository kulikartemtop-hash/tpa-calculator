<!DOCTYPE html>
<html lang="ru" data-theme="light" data-wallpaper="1">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Калькулятор ТПА</title>
    <style>
        /* Основные переменные */
        :root {
            --bg: #f0f4f8;
            --card: rgba(255, 255, 255, 0.95);
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #cbd5e1;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Темная тема */
        [data-theme="dark"] {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.95);
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --primary: #60a5fa;
            --primary-dark: #3b82f6;
            --success: #34d399;
            --danger: #f87171;
            --warning: #fbbf24;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        /* Темы обоев */
        [data-wallpaper="1"] body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        }
        [data-theme="dark"][data-wallpaper="1"] body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        /* Базовые стили */
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            margin: 0;
            padding: 0;
            font-size: 15px;
            transition: background 0.3s ease, color 0.3s ease;
            min-height: 100vh;
        }

        /* Панель настроек вверху */
        .top-controls {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 8px 12px;
            background: var(--card);
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 101;
            box-shadow: var(--shadow);
        }
        .icon-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text);
        }

        /* Переключатель вкладок */
        .tabs {
            display: flex;
            background: var(--card);
            box-shadow: var(--shadow);
        }
        .tab-btn {
            flex: 1;
            padding: 14px;
            border: none;
            background: transparent;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }
        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        /* Основной контейнер */
        .container {
            padding: 12px;
            max-width: 600px;
            margin: 0 auto;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Карточка ТПА */
        .tpa-card {
            background: var(--card);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 14px;
            border: 1px solid var(--border);
            border-left: 5px solid var(--primary);
            box-shadow: var(--shadow);
        }
        .tpa-header {
            font-weight: 800;
            font-size: 1.15rem;
            color: var(--primary-dark);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .tpa-mini-result {
            font-size: 0.75rem;
            font-weight: 600;
            text-align: right;
            line-height: 1.4;
        }
        .tpa-mini-result .good { color: var(--success); }
        .tpa-mini-result .defect { color: var(--danger); }
        .tpa-mini-result .batch { color: var(--warning); }

        /* Формы */
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 10px;
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full-width { grid-column: 1/-1; }
        select, input {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            background: var(--bg);
            color: var(--text);
            width: 100%;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--card);
        }

        /* Кнопки */
        button {
            width: 100%; /* Важно для мобилки */
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .add-batch-btn {
            background: linear-gradient(135deg, var(--warning) 0%, #d97706 100%);
            color: white;
        }
        .reset-btn {
            background: linear-gradient(135deg, var(--danger) 0%, #dc2626 100%);
            color: white;
            margin-top: 20px;
            margin-bottom: 40px;
        }
        .share-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            margin-top: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.3);
            display: none;
        }
        .share-btn.visible { display: block; }

        /* Таблица отчета */
        .summary-list {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            border-bottom: 1px solid var(--border);
        }
        .summary-item:last-child { border-bottom: none; }
        .summary-tpa {
            font-weight: 700;
            color: var(--primary-dark);
            min-width: 80px;
        }
        .summary-data {
            text-align: right;
            font-size: 0.85rem;
            line-height: 1.5;
        }
        .empty-hint {
            text-align: center;
            color: var(--text-secondary);
            padding: 30px 20px;
            font-style: italic;
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <div class="top-controls">
        <select id="wallpaper-select" class="compact-select">
            <option value="1">Фон: Спокойный</option>
            <option value="2">🌈 Фон: Яркий</option>
            <option value="3">🌌 Фон: Глубокий</option>
        </select>
        <button class="icon-btn" id="theme-btn">🌙</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tab-btn-calc">🧮 Калькулятор</button>
        <button class="tab-btn" id="tab-btn-setup">🔧 Для наладчика</button>
    </div>

    <div class="container">
        <!-- Вкладка Калькулятор -->
        <div id="tab-calc" class="tab-content active">
            <div id="tpa-container"></div>
            <button class="reset-btn" id="reset-btn">🗑️ Очистить все данные</button>
        </div>

        <!-- Вкладка Для наладчика -->
        <div id="tab-setup" class="tab-content">
            <!-- Здесь показываем только данные за смену -->
            <div id="on-setup-summary-container"></div>
            <button class="share-btn" id="share-btn">📤 Поделиться сменным отчетом</button>
        </div>
    </div>

    <script>
const TPA_LIST = [
    "ТПА 1", "ТПА 2", "ТПА 3", "ТПА 4", "ТПА 5", "ТПА 6", "ТПА 7", "ТПА 8", "ТПА 9", "ТПА 10", "ТПА 11", "ТПА 12", "ТПА 13", "Малыш"
];

function init() {
    const container = document.getElementById("tpa-container");
    let html = "";

    for (const [i, tpa] of TPA_LIST.entries()) {
        html += `
            <div class="tpa-card" data-tpa="${tpa}">
                <div class="tpa-header">
                    <span>${tpa}</span>
                    <div class="tpa-mini-result" id="res-${i}">
                        <div class="good">0 шт</div>
                    </div>
                </div>
                
                <!-- Группа: Готовая продукция за смену -->
                <div class="form-row">
                    <div class="form-group">
                        <label>Деталей в коробке (шт)</label>
                        <input type="number" class="calc-input" data-idx="${i}" data-field="perBox" inputmode="numeric" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label>Коробок за смену (шт)</label>
                        <input type="number" class="calc-input" data-idx="${i}" data-field="boxes" inputmode="numeric" placeholder="0">
                    </div>
                </div>

                <!-- Группа: Брак -->
                <div class="form-row">
                    <div class="form-group full-width">
                        <label>Брак за смену (шт)</label>
                        <input type="number" class="calc-input input-defect" data-idx="${i}" data-field="defect" inputmode="numeric" placeholder="0">
                    </div>
                </div>

                <!-- Группа: Вес детали -->
                <div class="form-row">
                    <div class="form-group full-width">
                        <label>Вес 1 детали (г)</label>
                        <input type="number" class="calc-input" data-idx="${i}" data-field="weight" inputmode="decimal" step="0.001" placeholder="0.000">
                    </div>
                </div>

                <!-- Группа: Накопленная партия -->
                <div class="form-row">
                    <div class="form-group full-width">
                        <label>Накопленная партия (шт)</label>
                        <input type="number" class="calc-input batch-total-editable" data-idx="${i}" data-field="batchTotal" inputmode="numeric" placeholder="0">
                    </div>
                </div>
            </div>
        `;
    }

    container.innerHTML = html;

    // Инициализация темы и обоев
    const savedTheme = localStorage.getItem("tpa_theme") || "light";
    const savedWallpaper = localStorage.getItem("tpa_wallpaper") || "1";
    document.documentElement.setAttribute("data-theme", savedTheme);
    document.documentElement.setAttribute("data-wallpaper", savedWallpaper);

    const wallpaperSelect = document.getElementById("wallpaper-select");
    wallpaperSelect.value = savedWallpaper;
    wallpaperSelect.addEventListener("change", () => changeWallpaper(wallpaperSelect.value));

    const themeBtn = document.getElementById("theme-btn");
    themeBtn.textContent = savedTheme === "light" ? "🌙" : "☀️";
    themeBtn.addEventListener("click", toggleTheme);

    // Сбор всех полей ввода
    const allInputs = document.querySelectorAll(".calc-input");
    allInputs.forEach(input => {
        input.addEventListener("input", () => {
            calculateAll();
            saveData();
        });
    });

    // Переключение вкладок
    const tabs = document.querySelectorAll(".tab-btn");
    tabs.forEach(tab => {
        tab.addEventListener("click", () => switchTab(tab.id.split("-")[2]));
    });

    // Загрузка сохраненных данных
    loadData();
    calculateAll();
}

function calculateAll() {
    const data = collectData();

    // 1. Генерируем отчет для вкладки "Для наладчика" (только смена)
    generateOnShiftReport(data);

    // 2. Генерируем отчет для вкладки "Калькулятор" (всё сразу)
    generateFullReport(data);
}

function collectData() {
    const inputs = document.querySelectorAll(".calc-input");
    const data = {};
    TPA_LIST.forEach((_, i) => {
        data[i] = {
            name: TPA_LIST[i],
            perBox: 0,
            boxes: 0,
            defect: 0,
            weight: 0,
            batchTotal: 0
        };
    });

    inputs.forEach(input => {
        const idx = input.dataset.idx;
        const field = input.dataset.field;
        const val = parseFloat(input.value) || 0;

        if (field === "mat") {
            data[idx][field] = input.value;
        } else {
            data[idx][field] = val;
        }
    });
    return data;
}
        function generateOnShiftReport(data) {
            const summaryContainer = document.getElementById(
                "on-setup-summary-container"
            );
            let html = "";
            let hasData = false;

            for (const key in data) {
                const d = data[key];
                const goodParts = d.perBox * d.boxes;
                const weightKg = (goodParts * d.weight) / 1000;

                if (goodParts > 0) {
                    hasData = true;
                    html += `
                        <div class="summary-item">
                            <div class="summary-tpa">${d.name}</div>
                            <div class="summary-data">
                                <div>Готовая продукция: ${goodParts.toFixed(0)} шт</div>
                                <div>Вес: ${weightKg.toFixed(3)} кг</div>
                            </div>
                        </div>
                    `;
                }
            }

            if (!hasData) {
                html =
                    "<div class='empty-hint'>Нет данных за смену</div>";
            }
            summaryContainer.innerHTML = html;
        }

        function generateFullReport(data) {
            const summaryContainer = document.getElementById(
                "summary-container"
            );
            let html = "";
            let hasData = false;

            for (const key in data) {
 const d = data[key];
                const goodPartsToday = d.perBox * d.boxes; // Сегодня
                const weightKgToday = (goodPartsToday * d.weight) / 1000;
                const weightKgDefect = (d.defect * d.weight) / 1000;
                const weightKgParty = (
                    (d.batchTotal + goodPartsToday) *
                    d.weight
                ) /
                    1000;

                // Мини-отчет справа в карточке
                const resEl = document.getElementById(`res-${key}`);
                if (resEl) {
                    const miniHtml = [];
                    if (goodPartsToday > 0)
                        miniHtml.push(
                            `<div class="good">Сегодня: ${goodPartsToday.toFixed(0)} шт</div>`
                        );
                    if (d.defect > 0)
                        miniHtml.push(
                            `<div class="defect">Брак: ${d.defect.toFixed(0)} шт</div>`
                        );
                    if (d.batchTotal > 0)
                        miniHtml.push(
                            `<div class="batch">Партия: ${d.batchTotal.toFixed(0)} шт</div>`
                        );
                    resEl.innerHTML = miniHtml.join("");
                }

                // Полный отчет
                if (
                    goodPartsToday > 0 ||
                    d.defect > 0 ||
                    d.batchTotal > 0
                ) {
                    hasData = true;
                    html += `
                        <div class="summary-item">
                            <div class="summary-tpa">${d.name}</div>
                            <div class="summary-data">
                                <div>Готовая (сегодня): ${goodPartsToday.toFixed(0)} шт</div>
                                <div>Вес готовой: ${weightKgToday.toFixed(3)} кг</div>
                                <div>Брак: ${d.defect.toFixed(0)} шт</div>
                                <div>Вес брака: ${weightKgDefect.toFixed(3)} кг</div>
                                <div>Партия (сегодня + ранее): ${(
                                    d.batchTotal + goodPartsToday
                                ).toFixed(0)} шт</div>
                                <div>Вес партии: ${weightKgParty.toFixed(3)} кг</div>
                            </div>
                        </div>
                    `;
                }
            }

            if (!hasData) {
                html = "<div class='empty-hint'>Нет данных</div>";
            }
            summaryContainer.innerHTML = html;
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute(
                "data-theme"
            );
            const next = current === "light" ? "dark" : "light";
            document.documentElement.setAttribute("data-theme", next);
            localStorage.setItem("tpa_theme", next);
            document.getElementById("theme-btn").textContent =
                next === "light" ? "🌙" : "☀️";
        }

        function changeWallpaper(val) {
            document.documentElement.setAttribute("data-wallpaper", val);
            localStorage.setItem("tpa_wallpaper", val);
        }

        function saveData() {
            const data = collectData();
            localStorage.setItem("tpa_calc_data", JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem("tpa_calc_data");
            if (saved) {
                const data = JSON.parse(saved);
                const inputs = document.querySelectorAll(".calc-input");
                inputs.forEach(input => {
                    const idx = input.dataset.idx;
                    const field = input.dataset.field;
                    if (data[idx] && data[idx][field] !== undefined) {
                        input.value = data[idx][field];
                    }
                });
            }
        }

        function switchTab(tabName) {
            [...document.querySelectorAll(".tab-content")].forEach(el =>
                el.classList.remove("active")
            );
            [...document.querySelectorAll(".tab-btn")].forEach(el =>
                el.classList.remove("active")
            );

            document.getElementById(`tab-${tabName}`).classList.add("active");
            document.getElementById(`tab-btn-${tabName}`).classList.add(
                "active"
            );

            // Пересчет нужен только для вкладки "Калькулятор"
            if (tabName === "calc") {
                calculateAll();
            }
        }

        // Инициализация
        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", init);
        } else {
            init();
        }
    </script>
</body>
</html>
