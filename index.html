<!DOCTYPE html>
<html lang="ru" data-theme="light" data-wallpaper="1">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Калькулятор ТПА</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --card: rgba(255, 255, 255, 0.95);
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #cbd5e1;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.95);
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --primary: #60a5fa;
            --primary-dark: #3b82f6;
            --success: #34d399;
            --danger: #f87171;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        [data-wallpaper="1"] body { 
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%); 
        }
        [data-theme="dark"][data-wallpaper="1"] body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
        }
        
        [data-wallpaper="2"] body { 
            background: linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%); 
        }
        [data-theme="dark"][data-wallpaper="2"] body { 
            background: linear-gradient(120deg, #1e1b4b 0%, #312e81 100%); 
        }
        
        [data-wallpaper="3"] body { 
            background: radial-gradient(circle at 10% 20%, rgb(239, 246, 255) 0%, rgb(219, 228, 255) 90%); 
        }        [data-theme="dark"][data-wallpaper="3"] body { 
            background: radial-gradient(circle at 10% 20%, #1e293b 0%, #0f172a 90%); 
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            margin: 0;
            padding: 0;
            font-size: 15px;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.3s ease, color 0.3s ease;
            min-height: 100vh;
        }

        .top-controls {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 8px 12px;
            background: var(--card);
            gap: 10px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 101;
        }

        .icon-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text);
        }

        .compact-select {
            padding: 8px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 0.9rem;
        }

        .tabs {            display: flex;
            background: var(--card);
            box-shadow: var(--shadow);
        }

        .tab-btn {
            flex: 1;
            padding: 14px;
            border: none;
            background: transparent;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .container {
            padding: 12px;
            max-width: 600px;
            margin: 0 auto;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .tpa-card {
            background: var(--card);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 14px;
            border: 1px solid var(--border);
            border-left: 5px solid var(--primary);
            box-shadow: var(--shadow);
        }
        
        .tpa-header {
            font-weight: 800;
            font-size: 1.15rem;
            color: var(--primary-dark);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border);
            display: flex;
            justify-content: space-between;            align-items: center;
        }

        .tpa-mini-result {
            font-size: 0.75rem;
            font-weight: 600;
            text-align: right;
            line-height: 1.4;
        }

        .tpa-mini-result .good { color: var(--success); }
        .tpa-mini-result .defect { color: var(--danger); }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .form-group { display: flex; flex-direction: column; }
        .form-group.full-width { grid-column: 1 / -1; }
        
        label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        select, input {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            background: var(--bg);
            color: var(--text);
            width: 100%;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--card);
        }

        .input-defect {
            border-color: #fca5a5 !important;
            background-color: rgba(239, 68, 68, 0.05) !important;
        }
        .summary-list {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            border-bottom: 1px solid var(--border);
        }

        .summary-item:last-child { border-bottom: none; }
        
        .summary-tpa {
            font-weight: 700;
            color: var(--primary-dark);
            min-width: 80px;
        }

        .summary-data {
            text-align: right;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .summary-data .parts { font-weight: 600; color: var(--text); }
        .summary-data .weight-good { color: var(--success); font-weight: 600; }
        .summary-data .weight-defect { color: var(--danger); font-weight: 600; }
        .summary-data .weight-total { color: var(--text-secondary); font-size: 0.8rem; }
        
        .material-summary-header {
            padding: 12px 14px;
            font-weight: 700;
            background: rgba(16, 185, 129, 0.1);
            border-bottom: 1px solid var(--border);
            color: var(--success);
            font-size: 1rem;
        }

        .material-item { background: rgba(16, 185, 129, 0.05); }
        .material-item .summary-tpa { color: var(--success); }

        .empty-hint {            text-align: center;
            color: var(--text-secondary);
            padding: 30px 20px;
            font-style: italic;
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .reset-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--danger) 0%, #dc2626 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 20px;
            margin-bottom: 40px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="top-controls">
        <select id="wallpaper-select" class="compact-select">
            <option value="1">🎨 Фон: Спокойный</option>
            <option value="2">🌈 Фон: Яркий</option>
            <option value="3">🌌 Фон: Глубокий</option>
        </select>
        <button class="icon-btn" id="theme-btn">🌙</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tab-calc-btn">🧮 Калькулятор</button>
        <button class="tab-btn" id="tab-setup-btn">🔧 Для наладчика</button>
    </div>

    <div class="container">
        <div id="tab-calc" class="tab-content active">
            <div id="tpa-container"></div>
            <button class="reset-btn" id="reset-btn">🗑️ Очистить все данные</button>
        </div>

        <div id="tab-setup" class="tab-content">
            <div class="summary-list" id="summary-container"></div>
        </div>
    </div>
    <script>
        const TPA_LIST = ["ТПА 1", "ТПА 2", "ТПА 3", "ТПА 4", "ТПА 5", "ТПА 6", "ТПА 7", "ТПА 8", "ТПА 9", "ТПА 10", "ТПА 11", "ТПА 12", "ТПА 13", "Малыш"];
        const MATERIALS = ["ПВХ серый", "ПВХ коричневый", "АБС", "PP"];

        // Запускаем сразу после загрузки DOM
        createTPACards();
        loadSettings();
        loadData();
        calculateAll();
        setupEventListeners();

        function createTPACards() {
            const container = document.getElementById('tpa-container');
            if (!container) {
                console.error('Не найден tpa-container');
                return;
            }
            
            let html = '';
            TPA_LIST.forEach((tpa, index) => {
                const matOptions = MATERIALS.map(m => '<option value="' + m + '">' + m + '</option>').join('');
                html += '<div class="tpa-card" data-tpa="' + tpa + '">' +
                    '<div class="tpa-header">' +
                        '<span>' + tpa + '</span>' +
                        '<div class="tpa-mini-result" id="res-' + index + '"><div class="good">0 шт</div></div>' +
                    '</div>' +
                    '<div class="form-row">' +
                        '<div class="form-group full-width">' +
                            '<label>Материал</label>' +
                            '<select class="calc-input" data-idx="' + index + '" data-field="mat">' + matOptions + '</select>' +
                        '</div>' +
                    '</div>' +
                    '<div class="form-row">' +
                        '<div class="form-group">' +
                            '<label style="color: var(--success);">Готовые: шт. в кор.</label>' +
                            '<input type="number" class="calc-input" data-idx="' + index + '" data-field="perBox" inputmode="numeric" placeholder="0">' +
                        '</div>' +
                        '<div class="form-group">' +
                            '<label style="color: var(--success);">Готовые: кол-во кор.</label>' +
                            '<input type="number" class="calc-input" data-idx="' + index + '" data-field="boxes" inputmode="numeric" placeholder="0">' +
                        '</div>' +
                    '</div>' +
                    '<div class="form-row">' +
                        '<div class="form-group">' +
                            '<label style="color: var(--danger);">Брак (шт)</label>' +
                            '<input type="number" class="calc-input input-defect" data-idx="' + index + '" data-field="defect" inputmode="numeric" placeholder="0">' +
                        '</div>' +
                        '<div class="form-group">' +
                            '<label>Вес 1 дет. (г)</label>' +                            '<input type="number" class="calc-input" data-idx="' + index + '" data-field="weight" inputmode="decimal" step="0.001" placeholder="0.000">' +
                        '</div>' +
                    '</div>' +
                '</div>';
            });
            container.innerHTML = html;
            console.log('Карточки ТПА созданы:', TPA_LIST.length);
        }

        function setupEventListeners() {
            // Вкладки
            document.getElementById('tab-calc-btn').addEventListener('click', function() {
                switchTab('calc');
            });
            document.getElementById('tab-setup-btn').addEventListener('click', function() {
                switchTab('setup');
            });

            // Тема
            document.getElementById('theme-btn').addEventListener('click', toggleTheme);

            // Фон
            document.getElementById('wallpaper-select').addEventListener('change', function(e) {
                changeWallpaper(e.target.value);
            });

            // Очистка
            document.getElementById('reset-btn').addEventListener('click', resetAll);

            // Автосохранение при вводе
            document.addEventListener('input', function(e) {
                if (e.target.classList.contains('calc-input')) {
                    calculateAll();
                    saveData();
                }
            });
        }

        function loadSettings() {
            const savedTheme = localStorage.getItem('tpa_theme') || 'light';
            const savedWallpaper = localStorage.getItem('tpa_wallpaper') || '1';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.documentElement.setAttribute('data-wallpaper', savedWallpaper);
            document.getElementById('wallpaper-select').value = savedWallpaper;
            document.getElementById('theme-btn').textContent = savedTheme === 'light' ? '🌙' : '☀️';
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('tpa_theme', next);
            document.getElementById('theme-btn').textContent = next === 'light' ? '🌙' : '☀️';
        }

        function changeWallpaper(val) {
            document.documentElement.setAttribute('data-wallpaper', val);
            localStorage.setItem('tpa_wallpaper', val);
        }

        function saveData() {
            const inputs = document.querySelectorAll('.calc-input');
            const dataToSave = {};
            inputs.forEach(function(input) {
                const idx = input.dataset.idx;
                const field = input.dataset.field;
                if (!dataToSave[idx]) dataToSave[idx] = {};
                dataToSave[idx][field] = input.value;
            });
            localStorage.setItem('tpa_calc_data', JSON.stringify(dataToSave));
        }

        function loadData() {
            const saved = localStorage.getItem('tpa_calc_data');
            if (saved) {
                try {
                    const dataToSave = JSON.parse(saved);
                    const inputs = document.querySelectorAll('.calc-input');
                    inputs.forEach(function(input) {
                        const idx = input.dataset.idx;
                        const field = input.dataset.field;
                        if (dataToSave[idx] && dataToSave[idx][field] !== undefined) {
                            input.value = dataToSave[idx][field];
                        }
                    });
                } catch(e) {
                    console.error('Ошибка загрузки данных:', e);
                }
            }
        }

        function calculateAll() {
            const inputs = document.querySelectorAll('.calc-input');
            const data = {};
            
            TPA_LIST.forEach((tpa, index) => {
                data[index] = { name: tpa, mat: MATERIALS[0], perBox: 0, boxes: 0, weight: 0, defect: 0 };
            });

            inputs.forEach(function(input) {                const idx = input.dataset.idx;
                const field = input.dataset.field;
                if (field === 'mat') {
                    data[idx].mat = input.value;
                } else {
                    const val = parseFloat(input.value);
                    if (!isNaN(val) && val >= 0) {
                        data[idx][field] = val;
                    }
                }
            });

            let summaryHtml = '';
            let hasData = false;
            const materialTotals = {};

            TPA_LIST.forEach((tpa, index) => {
                const d = data[index];
                const goodParts = d.perBox * d.boxes;
                const defectParts = d.defect;
                
                const goodWeightKg = (goodParts * d.weight) / 1000;
                const defectWeightKg = (defectParts * d.weight) / 1000;
                const totalWeightKg = goodWeightKg + defectWeightKg;

                const resEl = document.getElementById('res-' + index);
                if (resEl) {
                    if (goodParts > 0 || defectParts > 0) {
                        let miniHtml = '<div class="good">Гот: ' + goodParts + ' шт</div>';
                        if (defectParts > 0) {
                            miniHtml += '<div class="defect">Брак: ' + defectParts + ' шт</div>';
                        }
                        resEl.innerHTML = miniHtml;
                        hasData = true;
                    } else {
                        resEl.innerHTML = '<div class="good">0 шт</div>';
                    }
                }

                if (goodParts > 0 || defectParts > 0) {
                    summaryHtml += '<div class="summary-item">' +
                        '<div class="summary-tpa">' + tpa + '</div>' +
                        '<div class="summary-data">' +
                            '<div class="parts">Гот: ' + goodParts + ' шт | Брак: ' + defectParts + ' шт</div>' +
                            '<div class="weight-good">Вес готовых: ' + goodWeightKg.toFixed(3) + ' кг</div>' +
                            '<div class="weight-defect">Вес брака: ' + defectWeightKg.toFixed(3) + ' кг</div>' +
                            '<div class="weight-total">Общий вес: ' + totalWeightKg.toFixed(3) + ' кг</div>' +
                        '</div>' +
                    '</div>';
                    if (!materialTotals[d.mat]) {
                        materialTotals[d.mat] = { totalWeight: 0, goodWeight: 0, defectWeight: 0 };
                    }
                    materialTotals[d.mat].totalWeight += totalWeightKg;
                    materialTotals[d.mat].goodWeight += goodWeightKg;
                    materialTotals[d.mat].defectWeight += defectWeightKg;
                }
            });

            const summaryContainer = document.getElementById('summary-container');
            if (summaryContainer) {
                if (hasData) {
                    let matSummaryHtml = '<div class="material-summary-header">📦 Итого по сырью:</div>';
                    for (const mat in materialTotals) {
                        const stats = materialTotals[mat];
                        matSummaryHtml += '<div class="summary-item material-item">' +
                            '<div class="summary-tpa">' + mat + '</div>' +
                            '<div class="summary-data">' +
                                '<div class="parts">' + stats.totalWeight.toFixed(3) + ' кг всего</div>' +
                                '<div class="weight-good">Готовые: ' + stats.goodWeight.toFixed(3) + ' кг</div>' +
                                '<div class="weight-defect">Брак: ' + stats.defectWeight.toFixed(3) + ' кг</div>' +
                            '</div>' +
                        '</div>';
                    }
                    summaryHtml += matSummaryHtml;
                    summaryContainer.innerHTML = summaryHtml;
                } else {
